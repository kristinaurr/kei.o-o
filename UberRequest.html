<!DOCTYPE html>

<html>
<head>
		<meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
		<title>Uber Request</title>
		<style>
	
		
		.box input{
				display:block;
				height:35px;
				width:95%;
				margin-top:10px;
		}
		.box input+ input{
				margin-bottom:20px;
		}
		
		.but button{
				height:40px;
				width:30%;
				display: inline-block;
				vertical-align: middle;
		}
			.but-t{
				background-color:#000000;
				color:#FFFFFF;
		}
		
		</style>
</head>
<body>
		<h1>Request a ride now</h1>
		
		<div class="box">
			<input type="text" placeholder="Enter Pickup Location">
			<input type="text" placeholder="Enter Destination">
		</div>
		
		<div class="but">
		<button class="but-t"type="submit">Request Now</button>
		<button type="submit">Schedule For Later</button>
				</div>
		
</body>
</html>
