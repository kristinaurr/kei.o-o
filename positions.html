<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
		<title>Positions</title>
		<style>
		.header{
		background-color:#D2C4B4;
		top:0;
		left:0;
		right:0;
		height:50px;
		position:fixed;
		}
		
		.sidebar{
		position:fixed;
		background-color:#8E977D;
		width:50px;
		left:0;
		top:50px;
		bottom:0;
		}
		</style>
</head>

<body>
	<div class="header">header</div>
	<div class="sidebar">sidebar</div>

</body>
<html>
