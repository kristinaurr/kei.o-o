<!DOCTYPE html>

<html>
<head>
		<meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
		<title>Using Display Property</title>
		<style>
		
		body{
				font-family:times new roman;
		}
		
		.x input {
				display:block;
				margin-bottom:5px;
		}
		
		.butt button{
				display:inline-block;
				width:30px;
				height: 20px;
				border: solid;
				border-radius:4px;
				text-align:center;
				margin-top:33px;
		}
		
		.butt p {
				float:left;
				width:60%;
				height:30px;
		}
		
		.butt p, button {
				width: 30%:
				display:inline-block;
				vertical-align: middle;
				margin-bottom:40px;
		}
		
				.img{
				display:block;
				margin:0 auto;
		}
		
		.srch{
				display:block;
				border-radius:50px;
				width:90%;
				padding:6px;
				border:solid;
				border-color:#8F8F8F;
				margin:0 auto;
		}
		
			.top input{
					margin-top:40px;
				display:inline-block;
				height:30px;
				border:1px;
				border:solid;
				border-color:#B6B6B6;
				border-radius:4px;
		}
		.top  input + input + input{
				display:block;
				width:94.6%;
				height:30px;
				border:1px;
				border:solid;
				border-color:#B6B6B6;
				border-radius:4px;
				margin-top:10px;
		}
		.top button{
				display:block;
				width:97%;
				height:35px;
				border:none;
				background-color:#3774E9;
				border-radius:4px;
				margin-top:10px;
				color:#FFFFFF;
		}
		
				.box input{
				display:block;
				height:35px;
				width:95%;
				margin-top:10px;
		}
		.box input+ input{
				margin-bottom:20px;
		}
		
		.but button{
				height:40px;
				width:30%;
				display: inline-block;
				vertical-align: middle;
		}
			.but-t{
				background-color:#000000;
				color:#FFFFFF;
		}
		
		</style>
</head>
<body>
		
				
				<div class="x">
				<form>
						<input type="text" size="15"placeholder="Name">
						<input type="text" size="15"placeholder="Email">
				</form>
						</div>
		
		<div class="butt">
		<p class="q">Thanks for chatting with our customer support. 
		Would you like to take our quick survey?</p>
	 	<button type="Yes">Yes</button>
				<button type="No">No</button>
		</div>
				
		
		<img class="img" width="20%" alt="google image"
		src="google3.jpg">
				<input class="srch"type="text" placeholder=
				"Search Google or Type a URL">
						
				<div class="top">
		<input type="text" placeholder="First Name">
		<input type="text" placeholder="Last Name">
		<input type="text" placeholder="Email">
				<button type="Submit">Sign Up</button>
				</div>
		
			<h1>Request a ride now</h1>
		
		<div class="box">
			<input type="text" placeholder="Enter Pickup Location">
			<input type="text" placeholder="Enter Destination">
		</div>
		
		<div class="but">
		<button class="but-t"type="submit">Request Now</button>
		<button type="submit">Schedule For Later</button>
				</div>
		
		
		
</body>
</html>
